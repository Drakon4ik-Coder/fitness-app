name: Backend CI
on:
  pull_request:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fitness
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fitness
      DJANGO_SECRET_KEY: ci-secret
      DJANGO_SETTINGS_MODULE: config.settings.base
    steps:
      - uses: actions/checkout@v4
      - name: Verify required files
        working-directory: ${{ github.workspace }}
        run: |
          test -f README.md
          test -f LICENSE
          test -f NOTICE
      - uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name == 'pull_request'
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'contracts/**'
              - '.github/workflows/backend.yml'
      - uses: actions/setup-python@v5
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        with: { python-version: '3.12' }
      - name: Install Poetry
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        run: pip install poetry
      - name: Cache Poetry dependencies
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('apps/backend/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      - name: Install deps
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        run: poetry install --no-interaction --no-root --sync
      - name: Export OpenAPI schema
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        run: ./scripts/export_openapi.sh
      - name: Check OpenAPI contract is up to date
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        run: git diff --exit-code ../../contracts/openapi.yaml
      - name: Lint (Ruff)
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        run: poetry run ruff check --output-format=github .
      - name: Format (Ruff)
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        run: poetry run ruff format --check .
      - name: Type check (mypy)
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        run: poetry run mypy .
      - name: Test
        if: github.event_name != 'pull_request' || steps.changes.outputs.backend == 'true'
        run: poetry run pytest --maxfail=1 --disable-warnings -q
