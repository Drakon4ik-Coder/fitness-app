name: Mobile CI
on:
  pull_request:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name == 'pull_request'
        with:
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'contracts/**'
              - '.github/workflows/mobile.yml'
      - uses: subosito/flutter-action@v2
        if: github.event_name != 'pull_request' || steps.changes.outputs.mobile == 'true'
        with:
          channel: 'stable'
          cache: true
      - name: Cache pub dependencies
        if: github.event_name != 'pull_request' || steps.changes.outputs.mobile == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('apps/mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Flutter Pub Get
        if: github.event_name != 'pull_request' || steps.changes.outputs.mobile == 'true'
        run: flutter pub get
      - name: Analyze
        if: github.event_name != 'pull_request' || steps.changes.outputs.mobile == 'true'
        run: dart analyze
      - name: Test
        if: github.event_name != 'pull_request' || steps.changes.outputs.mobile == 'true'
        run: flutter test
